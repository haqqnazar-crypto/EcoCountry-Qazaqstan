
<style>
*{box-sizing:border-box;margin:0;padding:0}
#wrap{padding:16px;font-family:var(--font-sans);max-width:680px}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.htitle{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.turn-pill{font-size:12px;color:var(--color-text-secondary);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:20px;padding:3px 10px}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:14px}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px}
.stat-lbl{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.stat-val{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.bar-row{margin-bottom:14px}
.bar-labels{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:6px}
.bar-item{font-size:12px;color:var(--color-text-secondary)}
.bar-item span{font-weight:500;color:var(--color-text-primary)}
.bars{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.bar-track{height:8px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease}
.bf-eco{background:#3B6D11}.bf-ppl{background:#185FA5}.bf-gov{background:#854F0B}
.bf-eco.w{background:#BA7517}.bf-ppl.w{background:#BA7517}.bf-gov.w{background:#BA7517}
.bf-eco.d{background:#A32D2D}.bf-ppl.d{background:#A32D2D}.bf-gov.d{background:#A32D2D}

.risk-banner{border-radius:var(--border-radius-md);padding:7px 12px;margin-bottom:12px;font-size:12px;display:flex;align-items:center;gap:8px}
.risk-low{background:#EAF3DE;color:#27500A;border:0.5px solid #C0DD97}
.risk-med{background:#FAEEDA;color:#633806;border:0.5px solid #FAC775}
.risk-high{background:#FCEBEB;color:#791F1F;border:0.5px solid #F7C1C1}

.event-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:12px}
.event-tag{font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.event-txt{font-size:14px;line-height:1.5;color:var(--color-text-primary);margin-bottom:8px}
.advisor{font-size:12px;color:var(--color-text-secondary);background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:6px 10px;border-left:2px solid var(--color-border-secondary);border-radius:0}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.choice{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px;cursor:pointer;text-align:left;transition:border-color .15s,transform .1s}
.choice:hover{border-color:var(--color-border-primary);transform:translateY(-1px)}
.choice:active{transform:scale(0.98)}
.choice.disabled{opacity:.4;pointer-events:none}
.ch-name{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px;line-height:1.4}
.ch-cost{font-size:11px;color:var(--color-text-secondary);margin-bottom:8px}
.ch-tags{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:11px;padding:2px 6px;border-radius:8px;font-weight:500}
.tpe{background:#EAF3DE;color:#27500A}.tne{background:#FCEBEB;color:#791F1F}
.tpp{background:#E6F1FB;color:#0C447C}.tnp{background:#FCEBEB;color:#791F1F}
.tpg{background:#FAEEDA;color:#633806}.tng{background:#FCEBEB;color:#791F1F}
.tpm{background:#EAF3DE;color:#27500A}.tnm{background:#FCEBEB;color:#791F1F}
.trisk{background:#F4C0D1;color:#72243E}

.consequence{border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:12px;display:none}
.cq-good{background:#EAF3DE;border:0.5px solid #C0DD97}
.cq-bad{background:#FCEBEB;border:0.5px solid #F7C1C1}
.cq-mixed{background:#FAEEDA;border:0.5px solid #FAC775}
.cq-title{font-size:13px;font-weight:500;margin-bottom:6px;color:var(--color-text-primary)}
.cq-body{font-size:13px;line-height:1.5;color:var(--color-text-primary)}
.cq-delayed{font-size:12px;color:var(--color-text-secondary);margin-top:6px;font-style:italic}
.cq-changes{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}

.next-btn{width:100%;padding:10px;font-size:14px;cursor:pointer;border-radius:var(--border-radius-md);display:none;margin-bottom:12px}

.history-title{font-size:12px;color:var(--color-text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.history-list{display:flex;flex-direction:column;gap:4px}
.hist-item{font-size:12px;color:var(--color-text-secondary);padding:4px 8px;background:var(--color-background-secondary);border-radius:4px;display:flex;justify-content:space-between}
.hist-badge{font-size:11px;padding:1px 6px;border-radius:8px}

#endscreen{display:none;padding:16px}
.end-header{font-size:20px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px}
.end-sub{font-size:14px;color:var(--color-text-secondary);margin-bottom:20px;line-height:1.5}
.end-score{font-size:36px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.end-score-lbl{font-size:13px;color:var(--color-text-secondary);margin-bottom:20px}
.decisions-log{margin-top:16px}
.dl-title{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:12px}
.dl-item{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px;margin-bottom:8px}
.dl-event{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.dl-choice{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.dl-consequence{font-size:12px;color:var(--color-text-secondary);line-height:1.4}
.dl-outcome{font-size:11px;margin-top:6px;display:flex;gap:4px;flex-wrap:wrap}
</style>

let G = {};
let delayedEffects = [];
let log = [];

function clamp(v){return Math.max(0,Math.min(100,v))}
function fmt(v){return (v>=0?'+':'')+v}

function init(){
  G = {eco:60,ppl:70,gov:65,mon:50,turn:0,score:0,order:shuffle([...Array(SCENARIOS.length).keys()])};
  delayedEffects = [];
  log = [];
  document.getElementById('wrap').style.display='block';
  document.getElementById('endscreen').style.display='none';
  document.getElementById('hist-list').innerHTML='';
  document.getElementById('consequence').style.display='none';
  document.getElementById('next-btn').style.display='none';
  render();
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function render(){
  updateStats();
  const s = SCENARIOS[G.order[G.turn]];
  document.getElementById('turn-lbl').textContent=`Ход ${G.turn+1} / 12`;
  document.getElementById('ev-tag').textContent=s.tag;
  document.getElementById('ev-txt').textContent=s.title;
  document.getElementById('ev-advisor').textContent='Советник: '+s.advisor;

  const riskEl = document.getElementById('risk-banner');
  const minVal = Math.min(G.eco,G.ppl,G.gov);
  if(minVal<25){
    riskEl.className='risk-banner risk-high';
    document.getElementById('risk-txt').textContent='Критическая ситуация! Одна из шкал близка к краху.';
    riskEl.querySelector('i').className='ti ti-alert-triangle';
  } else if(minVal<45 || G.mon < 10){
    riskEl.className='risk-banner risk-med';
    document.getElementById('risk-txt').textContent='Внимание: баланс нестабилен. Бюджет под давлением.';
    riskEl.querySelector('i').className='ti ti-alert-circle';
  } else {
    riskEl.className='risk-banner risk-low';
    document.getElementById('risk-txt').textContent='Город стабилен. Думайте о долгосрочных последствиях.';
    riskEl.querySelector('i').className='ti ti-shield-check';
  }

  const cw = document.getElementById('choices-wrap');
  cw.innerHTML='';
  s.choices.forEach((c,i)=>{
    const d = document.createElement('div');
    d.className='choice';
    let tagsHtml = c.tags.map(t=>`<span class="tag ${t[0]}">${t[1]}</span>`).join('');
    let riskHtml = c.risk_tag ? `<span class="tag trisk">${c.risk_tag}</span>` : '';
    d.innerHTML=`<div class="ch-name">${c.name}</div><div class="ch-cost">${c.cost}</div><div class="ch-tags">${tagsHtml}${riskHtml}</div>`;
    d.onclick=()=>choose(i);
    cw.appendChild(d);
  });
}

function choose(idx){
  const s = SCENARIOS[G.order[G.turn]];
  const c = s.choices[idx];
  const fx = c.fx;

  document.querySelectorAll('.choice').forEach(el=>el.classList.add('disabled'));

  G.eco = clamp(G.eco+fx.eco);
  G.ppl = clamp(G.ppl+fx.ppl);
  G.gov = clamp(G.gov+fx.gov);
  G.mon = Math.max(0, G.mon+(fx.mon||0));

  applyDelayedEffects();

  if(c.consequence.delayed){
    const parts = parseDelayed(c.consequence.delayed);
    if(parts) delayedEffects.push({turn: G.turn+parseInt(parts.delay), fx: parts.fx, label: parts.label});
  }

  const pts = Math.round((fx.eco+fx.ppl+fx.gov)*2 + (fx.mon||0)*0.3);
  G.score += pts;

  log.push({
    event: s.tag+' — '+s.title.substring(0,60)+'...',
    choice: c.name,
    consequence: c.consequence.body,
    delayed: c.consequence.delayed,
    fx: fx,
    pts: pts,
    type: c.consequence.type
  });

  showConsequence(c.consequence, pts);
  addHistory(s.tag, c.name, c.consequence.type, pts);
  updateStats();

  const gameOver = G.eco<=0||G.ppl<=0||G.gov<=0||G.mon<=0;
  const btn = document.getElementById('next-btn');
  btn.style.display='block';
  if(gameOver){
    btn.textContent='Посмотреть итоги →';
    btn.onclick=()=>endGame(false);
  } else if(G.turn>=11){
    btn.textContent='Финальные итоги →';
    btn.onclick=()=>endGame(true);
  } else {
    btn.textContent='Следующий ход →';
    btn.onclick=nextTurn;
  }
}

function parseDelayed(str){
  const m = str.match(/Через (\d+) хода?/);
  if(!m) return null;
  const delay = parseInt(m[1]);
  const eco = (str.match(/Эко ([+-]\d+)/)||[0,0])[1];
  const ppl = (str.match(/Люди ([+-]\d+)/)||[0,0])[1];
  const gov = (str.match(/Рейтинг ([+-]\d+)/)||[0,0])[1];
  const mon = (str.match(/Деньги ([+-]\d+)/)||[0,0])[1];
  return {delay, fx:{eco:parseInt(eco)||0,ppl:parseInt(ppl)||0,gov:parseInt(gov)||0,mon:parseInt(mon)||0}, label:str};
}

function applyDelayedEffects(){
  delayedEffects = delayedEffects.filter(d=>{
    if(d.turn <= G.turn){
      G.eco = clamp(G.eco+(d.fx.eco||0));
      G.ppl = clamp(G.ppl+(d.fx.ppl||0));
      G.gov = clamp(G.gov+(d.fx.gov||0));
      G.mon = Math.max(0,G.mon+(d.fx.mon||0));
      return false;
    }
    return true;
  });
}

function showConsequence(cq, pts){
  const el = document.getElementById('consequence');
  let cls = cq.type==='good'?'cq-good':cq.type==='bad'?'cq-bad':'cq-mixed';
  el.className='consequence '+cls;
  document.getElementById('cq-title').textContent=cq.title;
  document.getElementById('cq-body').textContent=cq.body;
  document.getElementById('cq-delayed').textContent=cq.delayed||'';
  document.getElementById('cq-changes').innerHTML='';
  el.style.display='block';
}

function addHistory(tag, choice, type, pts){
  const list = document.getElementById('hist-list');
  const d = document.createElement('div');
  d.className='hist-item';
  const col = type==='good'?'tpe':type==='bad'?'tne':'tpg';
  const sign = pts>0?'+':''
  d.innerHTML=`<span>${tag}: ${choice.substring(0,35)}${choice.length>35?'...':''}</span><span class="hist-badge tag ${col}">${sign}${pts} оч.</span>`;
  list.insertBefore(d, list.firstChild);
}

function updateStats(){
  document.getElementById('sv-eco').textContent=Math.round(G.eco)+'%';
  document.getElementById('sv-ppl').textContent=Math.round(G.ppl)+'%';
  document.getElementById('sv-gov').textContent=Math.round(G.gov)+'%';
  document.getElementById('sv-mon').textContent=Math.round(G.mon);
  const setBar=(id,val,prefix)=>{
    const b=document.getElementById(id);
    b.style.width=Math.round(val)+'%';
    b.className='bar-fill '+prefix+(val<20?' d':val<35?' w':'');
  };
  setBar('bar-eco',G.eco,'bf-eco');
  setBar('bar-ppl',G.ppl,'bf-ppl');
  setBar('bar-gov',G.gov,'bf-gov');
}

function nextTurn(){
  G.turn++;
  document.getElementById('consequence').style.display='none';
  document.getElementById('next-btn').style.display='none';
  document.querySelectorAll('.choice').forEach(el=>el.classList.remove('disabled'));
  render();
}

function endGame(win){
  document.getElementById('wrap').style.display='none';
  const es = document.getElementById('endscreen');
  es.style.display='block';

  const avg = Math.round((G.eco+G.ppl+G.gov)/3);
  const final = Math.round(G.score + avg*4 + G.mon*2);

  let title, sub;
  if(!win){
    const reason = G.eco<=0?'Экологическая катастрофа сделала город необитаемым.':G.ppl<=0?'Массовые протесты — вы отстранены от власти.':G.gov<=0?'Коррупция разрушила доверие. Вы проиграли выборы.':'Казна пуста. Город объявил банкротство.';
    title='Город рухнул'; sub=reason;
  } else if(final>700){
    title='Образцовый мэр'; sub='EcoCity стал примером для всей Центральной Азии. ООН предложила вам консультировать другие страны.';
  } else if(final>450){
    title='Устойчивое развитие'; sub='Вы нашли баланс. Город развивается. Не без ошибок — но вектор правильный.';
  } else if(final>250){
    title='Шаткий баланс'; sub='Город выжил, но потенциал не раскрыт. Слишком много компромиссов в пользу краткосрочной выгоды.';
  } else {
    title='Упущенный потенциал'; sub='Решения были безопасными, но трусливыми. Казахстан мог сделать больше.';
  }

  document.getElementById('end-title').textContent=title;
  document.getElementById('end-sub').textContent=sub;
  document.getElementById('end-score').textContent=final;

  const statsHtml = `
    <div class="stat"><div class="stat-lbl">Экология</div><div class="stat-val">${Math.round(G.eco)}%</div></div>
    <div class="stat"><div class="stat-lbl">Люди</div><div class="stat-val">${Math.round(G.ppl)}%</div></div>
    <div class="stat"><div class="stat-lbl">Управление</div><div class="stat-val">${Math.round(G.gov)}%</div></div>
    <div class="stat"><div class="stat-lbl">Бюджет</div><div class="stat-val">${Math.round(G.mon)} млрд</div></div>
  `;
  document.getElementById('end-stats').innerHTML=statsHtml;

  const dl = document.getElementById('dl-list');
  dl.innerHTML='';
  log.forEach((item,i)=>{
    const col = item.type==='good'?'tpe':item.type==='bad'?'tne':'tpg';
    const sign = item.pts>0?'+':'';
    const fxStr = [
      item.fx.eco?`Эко ${fmt(item.fx.eco)}%`:'',
      item.fx.ppl?`Люди ${fmt(item.fx.ppl)}%`:'',
      item.fx.gov?`Рейтинг ${fmt(item.fx.gov)}%`:'',
      item.fx.mon?`Деньги ${fmt(item.fx.mon)} млрд`:'',
    ].filter(Boolean);
    dl.innerHTML+=`
      <div class="dl-item">
        <div class="dl-event">Ход ${i+1} · ${item.event}</div>
        <div class="dl-choice">${item.choice}</div>
        <div class="dl-consequence">${item.consequence}</div>
        ${item.delayed?`<div class="dl-consequence" style="margin-top:4px;font-style:italic">${item.delayed}</div>`:''}
        <div class="dl-outcome">
          ${fxStr.map(f=>`<span class="tag ${f.includes('-')?'tne':'tpe'}">${f}</span>`).join('')}
          <span class="tag ${col}">${sign}${item.pts} очков</span>
        </div>
      </div>
    `;
  });
}

function restart(){init()}
init();
</script>
